<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GLM OCR 标注</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./result.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="title">
        <span class="mark"></span>
        <h1>GLM OCR 标注</h1>
        <span class="badge" id="summary">等待结果</span>
      </div>
      <div class="actions">
        <button id="fitBtn" type="button" title="自适应窗口" aria-label="适合窗口">
          <svg class="btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
          </svg>
          <span>自适应</span>
        </button>
        <button id="actualBtn" type="button" title="原始尺寸 1:1" aria-label="原始尺寸">
          <svg class="btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" stroke-dasharray="4 4"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <span>1:1 像素</span>
        </button>
        <button id="copyAllBtn" type="button" title="复制全部文本" aria-label="复制全部文本">
          <svg class="btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
          </svg>
          <span>复制全部</span>
        </button>
        <button id="exportBtn" type="button" title="导出已标注 PNG" aria-label="导出 PNG" class="btn-primary">
          <svg class="btn-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/>
          </svg>
          <span>导出图片</span>
        </button>
      </div>
    </header>

    <main class="workspace">
      <section class="canvas-pane" id="canvasPane">
        <canvas id="ocrCanvas"></canvas>
        <div class="empty" id="emptyState">
          <div class="empty-glow"></div>
          <svg class="empty-icon" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="9" cy="9" r="2"/>
            <path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/>
          </svg>
          <span class="empty-text">等待 OCR 识别结果</span>
        </div>
      </section>

      <aside class="side">
        <section class="meta">
          <div class="meta-card">
            <span class="label">OCR 状态</span>
            <strong id="statusText">-</strong>
          </div>
          <div class="meta-card">
            <span class="label">语言类型</span>
            <strong id="languageText">-</strong>
          </div>
        </section>

        <section class="search-panel">
          <div class="search-box">
            <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/>
            </svg>
            <input type="text" id="searchInput" placeholder="搜索识别到的文本..." autocomplete="off" />
            <button id="clearSearchBtn" type="button" class="clear-search" style="display: none;">&times;</button>
          </div>
        </section>

        <section class="text-list" id="textList"></section>
      </aside>
    </main>

    <div class="toast-container" id="toastContainer"></div>
    <script src="./result.js"></script>
  </body>
</html>
