<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self' https://fonts.googleapis.com https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'unsafe-inline'; connect-src *; font-src 'self' https://fonts.gstatic.com;"
    />
    <title>System API 实验室</title>
    <!-- 引入高档 Google Fonts 字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        color-scheme: dark;
        /* 配色系统 (精选 HSL 调色系统) */
        --bg: #090b10;
        --panel: #11141c;
        --panel-2: #181d2a;
        --line: rgba(255, 255, 255, 0.06);
        --line-active: rgba(99, 102, 241, 0.4);
        --text: #f3f4f6;
        --muted: #8493a8;
        
        --accent: #6366f1; /* Indigo */
        --accent-hover: #4f46e5;
        --accent-2: #14b8a6; /* Teal */
        --accent-2-hover: #0d9488;
        --danger: #f43f5e; /* Rose */
        --danger-hover: #e11d48;
        --warn: #f59e0b; /* Amber */
        --ok: #10b981; /* Emerald */
        
        --shadow: rgba(0, 0, 0, 0.35);
        --shadow-glow: rgba(99, 102, 241, 0.15);
        
        /* 字体系统 */
        --font-sans: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
        --font-mono: 'JetBrains Mono', 'Fira Code', ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      }

      @media (prefers-color-scheme: light) {
        :root {
          color-scheme: light;
          --bg: #f8fafc;
          --panel: #ffffff;
          --panel-2: #f1f5f9;
          --line: rgba(15, 23, 42, 0.07);
          --line-active: rgba(79, 70, 229, 0.3);
          --text: #0f172a;
          --muted: #64748b;
          
          --accent: #4f46e5;
          --accent-hover: #4338ca;
          --accent-2: #0d9488;
          --accent-2-hover: #0f766e;
          --danger: #e11d48;
          --danger-hover: #be123c;
          --warn: #d97706;
          --ok: #059669;
          
          --shadow: rgba(15, 23, 42, 0.05);
          --shadow-glow: rgba(79, 70, 229, 0.08);
        }
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: var(--font-sans);
        font-size: 13px;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* 滚动条整体美化 */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--line);
        border-radius: 99px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--muted);
      }

      /* 界面框架 */
      .app {
        display: grid;
        grid-template-rows: auto auto 1fr;
        height: 100%;
        min-height: 0;
      }

      /* Header 美化 */
      header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 16px 24px;
        border-bottom: 1px solid var(--line);
        background: var(--panel);
        backdrop-filter: blur(12px);
        z-index: 10;
      }

      h1 {
        margin: 0;
        font-size: 17px;
        font-weight: 650;
        letter-spacing: -0.02em;
        background: linear-gradient(135deg, var(--text) 30%, var(--muted) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      .subtle {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.5;
        margin-top: 3px;
      }

      .identity {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 8px;
      }

      .pill {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        max-width: 320px;
        min-height: 24px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 3px 10px;
        color: var(--muted);
        background: var(--panel-2);
        font-family: var(--font-mono);
        font-size: 11px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        transition: all 0.2s;
        box-shadow: 0 1px 2px var(--shadow);
      }
      .pill:hover {
        border-color: var(--accent);
        color: var(--text);
        transform: translateY(-0.5px);
      }
      .pill svg {
        width: 12px;
        height: 12px;
        flex-shrink: 0;
        opacity: 0.7;
      }

      /* Toolbar 美化 */
      .toolbar {
        display: flex;
        flex-direction: column;
        gap: 12px;
        padding: 14px 24px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel) 90%, var(--bg));
      }
      @media (min-width: 1024px) {
        .toolbar {
          flex-direction: row;
          align-items: center;
          justify-content: space-between;
        }
      }

      .actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
      }

      /* 按钮高级动效 */
      button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 32px;
        font-family: var(--font-sans);
        font-size: 12px;
        font-weight: 550;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 6px 14px;
        background: var(--panel-2);
        color: var(--text);
        cursor: pointer;
        user-select: none;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 1.5px 3px var(--shadow);
      }

      button:hover {
        border-color: var(--accent);
        background: color-mix(in srgb, var(--accent) 5%, var(--panel-2));
        transform: translateY(-1px);
        box-shadow: 0 3px 8px var(--shadow), 0 0 0 1px var(--line-active);
      }

      button:active {
        transform: translateY(0) scale(0.98);
      }

      button.primary {
        border-color: var(--accent);
        background: var(--accent);
        color: #ffffff;
        box-shadow: 0 2px 6px var(--shadow-glow);
      }

      button.primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
        box-shadow: 0 4px 12px var(--shadow-glow), 0 0 0 1px var(--accent-hover);
      }

      button.secondary {
        border-color: color-mix(in srgb, var(--accent-2) 40%, var(--line));
        background: color-mix(in srgb, var(--accent-2) 6%, var(--panel-2));
        color: var(--accent-2);
      }
      button.secondary:hover {
        background: var(--accent-2);
        border-color: var(--accent-2);
        color: #ffffff;
      }

      button.danger {
        border-color: color-mix(in srgb, var(--danger) 40%, var(--line));
        background: color-mix(in srgb, var(--danger) 6%, var(--panel-2));
        color: var(--danger);
      }
      button.danger:hover {
        background: var(--danger);
        border-color: var(--danger);
        color: #ffffff;
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
        transform: none !important;
        box-shadow: none !important;
      }

      /* 复选框 (Checkboxes) 定制化 */
      .checks {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
      }

      label.check {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 28px;
        padding: 4px 10px;
        border: 1px solid var(--line);
        border-radius: 6px;
        color: var(--muted);
        background: var(--panel-2);
        font-size: 11.5px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        user-select: none;
        box-shadow: 0 1px 2px var(--shadow);
      }

      label.check:hover {
        border-color: var(--accent);
        color: var(--text);
        transform: translateY(-0.5px);
      }

      label.check input[type="checkbox"] {
        width: 13px;
        height: 13px;
        margin: 0;
        accent-color: var(--accent);
        cursor: pointer;
      }

      label.check:has(input:checked) {
        background: color-mix(in srgb, var(--accent) 8%, var(--panel-2));
        border-color: var(--accent);
        color: var(--text);
        box-shadow: 0 2px 6px var(--shadow-glow);
      }

      /* 主体三列布局 */
      main {
        display: grid;
        grid-template-columns: 290px 1fr 1fr;
        gap: 16px;
        min-height: 0;
        padding: 16px;
      }

      aside,
      section.panel {
        display: flex;
        flex-direction: column;
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 10px;
        background: var(--panel);
        box-shadow: 0 6px 20px var(--shadow);
        overflow: hidden;
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        background: color-mix(in srgb, var(--panel-2) 30%, var(--panel));
      }

      h2 {
        margin: 0;
        font-size: 13px;
        font-weight: 650;
        color: var(--text);
        letter-spacing: -0.01em;
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
      }

      /* Metric Badges 美化 */
      .metric {
        display: inline-flex;
        align-items: center;
        height: 20px;
        border: 1px solid var(--line);
        border-radius: 4px;
        padding: 0 7px;
        color: var(--muted);
        background: var(--panel-2);
        font-size: 11px;
        font-weight: 600;
        box-shadow: 0 1px 1.5px var(--shadow);
        transition: all 0.2s;
      }

      .metric.ok {
        background: color-mix(in srgb, var(--ok) 8%, transparent);
        border-color: color-mix(in srgb, var(--ok) 30%, transparent);
        color: var(--ok);
      }

      .metric.fail {
        background: color-mix(in srgb, var(--danger) 8%, transparent);
        border-color: color-mix(in srgb, var(--danger) 30%, transparent);
        color: var(--danger);
      }

      .metric.warn {
        background: color-mix(in srgb, var(--warn) 8%, transparent);
        border-color: color-mix(in srgb, var(--warn) 30%, transparent);
        color: var(--warn);
      }

      /* Panel Body */
      .body {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding: 16px;
      }

      .stack {
        display: flex;
        flex-direction: column;
        gap: 4px;
        margin: 0;
        padding: 0;
      }

      /* 环境信息行美化 */
      .info-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 8px 10px;
        border-radius: 6px;
        transition: background 0.15s;
      }
      .info-row:hover {
        background: color-mix(in srgb, var(--panel-2) 40%, transparent);
      }

      .info-row dt {
        color: var(--muted);
        font-size: 11.5px;
        font-weight: 500;
      }

      .info-row dd {
        margin: 0;
        min-width: 0;
        max-width: 60%;
        font-family: var(--font-mono);
        font-size: 11px;
        color: var(--text);
        background: var(--panel-2);
        padding: 2.5px 7px;
        border-radius: 5px;
        border: 1px solid var(--line);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        text-align: right;
      }

      /* LED呼吸状态灯 */
      .status {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        min-height: 18px;
        color: var(--muted);
        font-size: 11.5px;
        font-weight: 550;
        transition: all 0.2s;
      }

      .status::before {
        content: '';
        display: inline-block;
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
        transition: all 0.3s;
      }

      .status.ok {
        color: var(--ok);
      }
      .status.ok::before {
        background: var(--ok);
        box-shadow: 0 0 6px var(--ok);
        animation: led-pulse 2s infinite ease-in-out;
      }

      .status.fail {
        color: var(--danger);
      }
      .status.fail::before {
        background: var(--danger);
        box-shadow: 0 0 6px var(--danger);
        animation: led-pulse 1s infinite ease-in-out;
      }

      @keyframes led-pulse {
        0%, 100% {
          opacity: 0.7;
          transform: scale(0.95);
        }
        50% {
          opacity: 1;
          transform: scale(1.05);
          box-shadow: 0 0 8px currentColor;
        }
      }

      /* 测试列表及卡片美化 */
      .result-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .result {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel-2);
        overflow: hidden;
        transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 1px 2px var(--shadow);
      }

      .result:hover {
        border-color: color-mix(in srgb, var(--accent) 30%, var(--line));
        box-shadow: 0 4px 12px var(--shadow);
        transform: translateY(-0.5px);
      }

      .result-head {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
      }

      .dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        background: var(--muted);
        flex-shrink: 0;
        transition: all 0.2s;
      }

      .dot.ok {
        background: var(--ok);
        box-shadow: 0 0 6px var(--ok);
      }

      .dot.fail {
        background: var(--danger);
        box-shadow: 0 0 6px var(--danger);
      }

      .dot.warn {
        background: var(--warn);
        box-shadow: 0 0 6px var(--warn);
      }

      .result-name {
        flex: 1;
        font-family: var(--font-mono);
        font-size: 11.5px;
        font-weight: 550;
        color: var(--text);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .result-meta {
        color: var(--muted);
        font-size: 10.5px;
        font-weight: 500;
        background: color-mix(in srgb, var(--text) 4%, transparent);
        padding: 2px 6px;
        border-radius: 4px;
        border: 1px solid var(--line);
      }

      /* Chevron 旋转折折叠面板 */
      details {
        border-top: 1px solid var(--line);
        background: color-mix(in srgb, var(--bg) 15%, transparent);
        transition: all 0.2s;
      }
      details[open] {
        background: color-mix(in srgb, var(--bg) 40%, transparent);
      }

      summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 8px 12px;
        color: var(--muted);
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        list-style: none;
        user-select: none;
        transition: color 0.2s;
      }
      summary::-webkit-details-marker {
        display: none;
      }
      summary:hover {
        color: var(--text);
      }

      summary::after {
        content: '';
        display: inline-block;
        width: 5px;
        height: 5px;
        border-right: 1.5px solid currentColor;
        border-bottom: 1.5px solid currentColor;
        transform: rotate(45deg) translateY(-1px);
        transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        margin-right: 4px;
      }
      details[open] summary::after {
        transform: rotate(-135deg) translateY(1px);
      }

      /* 返回值 JSON 盒子 (pre) */
      pre {
        margin: 0;
        padding: 0 12px 12px;
        color: var(--text);
        white-space: pre-wrap;
        overflow-wrap: anywhere;
        font-family: var(--font-mono);
        font-size: 11px;
        line-height: 1.5;
        max-height: 280px;
        overflow-y: auto;
      }

      /* 极简精致空状态 */
      .empty {
        min-height: 160px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 10px;
        color: var(--muted);
        border: 1px dashed var(--line);
        border-radius: 8px;
        text-align: center;
        padding: 24px;
        background: color-mix(in srgb, var(--panel-2) 20%, transparent);
        font-size: 12px;
        line-height: 1.5;
      }

      .empty::before {
        content: '⚙️';
        font-size: 22px;
        margin-bottom: 4px;
        opacity: 0.65;
        filter: grayscale(0.2);
        animation: spin-slow 12s infinite linear;
      }

      @keyframes spin-slow {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @media (max-width: 1024px) {
        main {
          grid-template-columns: 1fr;
          overflow: auto;
        }

        aside,
        section.panel {
          min-height: 360px;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <header>
        <div>
          <h1>System API 实验室</h1>
          <div class="subtle">
            同一窗口中分别调用 UI preload facade 与 Node runtime SDK，覆盖 system 标准能力。
          </div>
        </div>
        <div class="identity" aria-label="运行身份">
          <span class="pill" id="brick-id">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line></svg>
            brickId: -
          </span>
          <span class="pill" id="instance-id">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            instanceId: -
          </span>
        </div>
      </header>

      <div class="toolbar">
        <div class="actions">
          <button class="primary" id="run-ui">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            运行 UI 测试
          </button>
          <button class="primary" id="run-runtime">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line></svg>
            运行 Runtime 测试
          </button>
          <button class="secondary" id="run-both">运行两侧测试</button>
          <button id="pick-directory">选择目录</button>
          <button id="load-manifest">读取 Manifest</button>
          <button class="danger" id="clear-results">清空结果</button>
        </div>
        <div class="checks" aria-label="副作用选项">
          <label class="check"><input id="opt-notify" type="checkbox" checked />通知</label>
          <label class="check"><input id="opt-beep" type="checkbox" checked />提示音</label>
          <label class="check"><input id="opt-trash" type="checkbox" checked />移入废纸篓</label>
          <label class="check"><input id="opt-open-external" type="checkbox" />打开链接</label>
          <label class="check"><input id="opt-open-path" type="checkbox" />打开文件</label>
          <label class="check"><input id="opt-show-folder" type="checkbox" />定位文件</label>
          <label class="check"><input id="opt-pick-dir" type="checkbox" />全量含选目录</label>
        </div>
      </div>

      <main>
        <aside>
          <div class="panel-title">
            <h2>环境</h2>
            <span class="status" id="health-status">等待检测</span>
          </div>
          <div class="body">
            <dl class="stack" id="health"></dl>
          </div>
        </aside>

        <section class="panel">
          <div class="panel-title">
            <h2>UI preload facade</h2>
            <div class="summary" id="ui-summary"></div>
          </div>
          <div class="body">
            <div class="status" id="ui-status">尚未运行</div>
            <div class="result-list" id="ui-results" style="margin-top: 10px">
              <div class="empty">点击“运行 UI 测试”，页面会调用 window.brickly.system.*。</div>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">
            <h2>Runtime SDK</h2>
            <div class="summary" id="runtime-summary"></div>
          </div>
          <div class="body">
            <div class="status" id="runtime-status">尚未运行</div>
            <div class="result-list" id="runtime-results" style="margin-top: 10px">
              <div class="empty">点击“运行 Runtime 测试”，页面会 invoke runtime 命令。</div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      const DOC_URL = 'https://www.u-tools.cn/docs/developer/utools-api/system.html'
      const PATH_NAMES = [
        'home',
        'appData',
        'assets',
        'userData',
        'sessionData',
        'temp',
        'exe',
        'module',
        'desktop',
        'documents',
        'downloads',
        'music',
        'pictures',
        'videos',
        'recent',
        'logs',
        'crashDumps'
      ]

      const $ = (id) => document.getElementById(id)

      const controls = [
        'run-ui',
        'run-runtime',
        'run-both',
        'pick-directory',
        'load-manifest',
        'clear-results'
      ]

      function setBusy(busy) {
        for (const id of controls) {
          $(id).disabled = busy
        }
      }

      function getOptions() {
        return {
          notify: $('opt-notify').checked,
          beep: $('opt-beep').checked,
          trash: $('opt-trash').checked,
          openExternal: $('opt-open-external').checked,
          openPath: $('opt-open-path').checked,
          showInFolder: $('opt-show-folder').checked,
          pickDirectory: $('opt-pick-dir').checked
        }
      }

      function summarizeValue(value) {
        if (value === undefined) return null
        if (typeof value === 'string') {
          if (value.startsWith('data:image/')) {
            return `${value.slice(0, 56)}... (${value.length} chars)`
          }
          return value.length > 280 ? `${value.slice(0, 280)}... (${value.length} chars)` : value
        }
        if (value && typeof value === 'object') {
          const json = JSON.stringify(value)
          if (json.length > 1600) {
            return {
              type: Array.isArray(value) ? 'array' : 'object',
              preview: `${json.slice(0, 1600)}... (${json.length} chars)`
            }
          }
        }
        return value
      }

      function inferErrorCode(message) {
        if (message.includes('CURRENT_FOLDER_UNAVAILABLE')) return 'CURRENT_FOLDER_UNAVAILABLE'
        if (message.includes('UNSUPPORTED_PLATFORM')) return 'UNSUPPORTED_PLATFORM'
        if (message.includes('PERMISSION_DENIED')) return 'PERMISSION_DENIED'
        if (message.includes('INVALID_INPUT')) return 'INVALID_INPUT'
        if (message.includes('SYSTEM_FAILED')) return 'SYSTEM_FAILED'
        return 'ERROR'
      }

      function normalizeError(error) {
        const message =
          error && typeof error.message === 'string'
            ? error.message
            : error && typeof error === 'object'
              ? JSON.stringify(error)
              : String(error)
        return {
          code: error && error.code ? String(error.code) : inferErrorCode(message),
          message,
          details: error && error.details ? error.details : undefined
        }
      }

      function formatJson(value) {
        return JSON.stringify(value, null, 2)
      }

      function summarizeItems(items) {
        const failed = items.filter((item) => !item.ok)
        return {
          total: items.length,
          passed: items.length - failed.length,
          failed: failed.length
        }
      }

      function setStatus(id, text, kind) {
        const el = $(id)
        el.textContent = text
        el.className = `status ${kind || ''}`.trim()
      }

      function renderSummary(id, summary) {
        const el = $(id)
        if (!summary) {
          el.innerHTML = ''
          return
        }
        el.innerHTML = [
          metric(`总数 ${summary.total}`),
          metric(`通过 ${summary.passed}`, 'ok'),
          metric(`失败 ${summary.failed}`, summary.failed ? 'fail' : 'ok')
        ].join('')
      }

      function metric(text, kind) {
        return `<span class="metric ${kind || ''}">${escapeHtml(text)}</span>`
      }

      function renderResults(target, report) {
        const list = $(`${target}-results`)
        const summary = report.summary || summarizeItems(report.items || [])
        renderSummary(`${target}-summary`, summary)
        if (!report.items || report.items.length === 0) {
          list.innerHTML = '<div class="empty">没有结果</div>'
          return
        }
        list.innerHTML = report.items
          .map((item) => {
            const kind = item.ok ? 'ok' : 'fail'
            const payload = item.error ? { error: item.error } : { result: item.result }
            return `
              <article class="result">
                <div class="result-head">
                  <span class="dot ${kind}"></span>
                  <span class="result-name" title="${escapeAttr(item.name)}">${escapeHtml(item.name)}</span>
                  <span class="result-meta">${escapeHtml(item.status || 'ok')} · ${Number(item.ms || 0)}ms</span>
                </div>
                <details>
                  <summary>查看返回值</summary>
                  <pre>${escapeHtml(formatJson(payload))}</pre>
                </details>
              </article>`
          })
          .join('')
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;')
      }

      function escapeAttr(value) {
        return escapeHtml(value).replaceAll('\n', ' ')
      }

      function createReport(source, options) {
        return {
          source,
          createdAt: new Date().toISOString(),
          options,
          items: []
        }
      }

      async function record(report, name, run) {
        const startedAt = performance.now()
        try {
          const value = await run()
          const item = {
            name,
            ok: true,
            status: 'ok',
            ms: Math.round(performance.now() - startedAt),
            result: summarizeValue(value)
          }
          report.items.push(item)
          return item
        } catch (error) {
          const normalized = normalizeError(error)
          const item = {
            name,
            ok: false,
            status: 'error',
            ms: Math.round(performance.now() - startedAt),
            error: normalized
          }
          report.items.push(item)
          return item
        }
      }

      function requireBrickly() {
        if (!window.brickly) throw new Error('window.brickly is not available')
        if (!window.brickly.system) throw new Error('window.brickly.system is not available')
        return window.brickly
      }

      async function runUiSuite() {
        const options = getOptions()
        const report = createReport('ui', options)
        setStatus('ui-status', 'UI 测试运行中...', '')
        renderSummary('ui-summary', null)
        $('ui-results').innerHTML = '<div class="empty">正在调用 UI preload facade...</div>'

        const brickly = requireBrickly()
        const system = brickly.system
        let temp = null

        await record(report, 'window.brickly.brickId', () => brickly.brickId)
        await record(report, 'window.brickly.instanceId', () => brickly.instanceId || null)
        await record(report, 'window.AIBricks present', () => typeof window.AIBricks !== 'undefined')
        await record(report, 'customPreload.nodeInfo', () => window.systemLabNode.nodeInfo())
        await record(report, 'customPreload.createTempFile', async () => {
          temp = await window.systemLabNode.createTempFile('ui')
          report.temp = temp
          return temp
        })
        await record(report, 'brickly.getManifest', () => brickly.getManifest())

        if (options.pickDirectory) {
          await record(report, 'brickly.fs.pickDirectory', () => brickly.fs.pickDirectory())
        }

        await record(report, 'system.getAppName', () => system.getAppName())
        await record(report, 'system.getAppVersion', () => system.getAppVersion())
        await record(report, 'system.getNativeId', () => system.getNativeId())
        await record(report, 'system.isDev', () => system.isDev())
        await record(report, 'system.isMacOS', () => system.isMacOS())
        await record(report, 'system.isWindows', () => system.isWindows())
        await record(report, 'system.isLinux', () => system.isLinux())

        for (const name of PATH_NAMES) {
          await record(report, `system.getPath:${name}`, () => system.getPath(name))
        }

        await record(report, 'system.getFileIcon:.txt', () => system.getFileIcon('.txt'))
        await record(report, 'system.getFileIcon:folder', () => system.getFileIcon('folder'))
        if (temp) {
          await record(report, 'system.getFileIcon:temp-file', () => system.getFileIcon(temp.filePath))
        }

        if (options.notify) {
          await record(report, 'system.showNotification', () =>
            system.showNotification('System API Lab UI notification', 'system-api-lab')
          )
        }

        if (options.beep) {
          await record(report, 'system.shellBeep', () => system.shellBeep())
        }

        if (options.openExternal) {
          await record(report, 'system.shellOpenExternal', () => system.shellOpenExternal(DOC_URL))
        }

        if (temp && options.openPath) {
          await record(report, 'system.shellOpenPath', () => system.shellOpenPath(temp.filePath))
        }

        if (temp && options.showInFolder) {
          await record(report, 'system.shellShowItemInFolder', () =>
            system.shellShowItemInFolder(temp.filePath)
          )
        }

        if (temp && options.trash) {
          await record(report, 'system.shellTrashItem', () => system.shellTrashItem(temp.filePath))
        }

        await record(report, 'system.readCurrentFolderPath', () => system.readCurrentFolderPath())
        await record(report, 'system.readCurrentBrowserUrl', () => system.readCurrentBrowserUrl())

        report.summary = summarizeItems(report.items)
        renderResults('ui', report)
        setStatus(
          'ui-status',
          report.summary.failed ? `UI 测试完成，有 ${report.summary.failed} 项失败` : 'UI 测试完成',
          report.summary.failed ? 'fail' : 'ok'
        )
        return report
      }

      async function runRuntimeSuite() {
        const options = getOptions()
        setStatus('runtime-status', 'Runtime 测试运行中...', '')
        renderSummary('runtime-summary', null)
        $('runtime-results').innerHTML = '<div class="empty">正在 invoke run-system-suite...</div>'
        const brickly = requireBrickly()
        if (typeof brickly.invoke !== 'function') {
          const report = createReport('runtime-unavailable', options)
          report.items.push({
            name: 'window.brickly.invoke',
            ok: false,
            status: 'error',
            ms: 0,
            error: {
              code: 'RUNTIME_UNAVAILABLE',
              message: !brickly.instanceId
                ? '当前是纯 UI Brick，没有 runtime command。'
                : '检测到 instanceId 但 invoke 不可用，请检查 runtime UI preload。'
            }
          })
          report.summary = summarizeItems(report.items)
          renderResults('runtime', report)
          setStatus(
            'runtime-status',
            'Runtime API 不可用',
            'fail'
          )
          return report
        }
        const report = await brickly.invoke('run-system-suite', options)
        renderResults('runtime', report)
        setStatus(
          'runtime-status',
          report.summary && report.summary.failed
            ? `Runtime 测试完成，有 ${report.summary.failed} 项失败`
            : 'Runtime 测试完成',
          report.summary && report.summary.failed ? 'fail' : 'ok'
        )
        return report
      }

      async function refreshHealth() {
        const rows = []
        const brickly = window.brickly
        rows.push(['brickly', Boolean(brickly)])
        rows.push(['AIBricks', Boolean(window.AIBricks)])
        rows.push(['system', Boolean(brickly && brickly.system)])
        rows.push(['invoke', Boolean(brickly && brickly.invoke)])
        rows.push(['stream', Boolean(brickly && brickly.stream)])
        rows.push(['custom preload', Boolean(window.systemLabNode)])
        if (brickly) {
          $('brick-id').childNodes[2].textContent = ` brickId: ${brickly.brickId || '-'}`
          $('instance-id').childNodes[2].textContent = ` instanceId: ${brickly.instanceId || '-'}`
        }
        if (window.systemLabNode) {
          try {
            const info = await window.systemLabNode.nodeInfo()
            rows.push(['node', info.node])
            rows.push(['platform', `${info.platform}/${info.arch}`])
            rows.push(['tmpdir', info.tmpdir])
          } catch (error) {
            rows.push(['nodeInfo error', normalizeError(error).message])
          }
        }
        $('health').innerHTML = rows
          .map(
            ([key, value]) => `
            <div class="info-row">
              <dt>${escapeHtml(key)}</dt>
              <dd>${escapeHtml(typeof value === 'boolean' ? (value ? 'yes' : 'no') : value)}</dd>
            </div>`
          )
          .join('')
        const ready = Boolean(brickly && brickly.system && window.systemLabNode)
        setStatus('health-status', ready ? '可测试' : '缺少能力', ready ? 'ok' : 'fail')
      }

      async function pickDirectory() {
        const brickly = requireBrickly()
        setStatus('ui-status', '等待选择目录...', '')
        try {
          const selected = await brickly.fs.pickDirectory()
          const report = createReport('ui-pick-directory', getOptions())
          report.items.push({
            name: 'brickly.fs.pickDirectory',
            ok: true,
            status: selected ? 'ok' : 'cancelled',
            ms: 0,
            result: selected || null
          })
          report.summary = summarizeItems(report.items)
          renderResults('ui', report)
          setStatus('ui-status', selected ? '已选择目录' : '已取消选择目录', selected ? 'ok' : '')
        } catch (error) {
          setStatus('ui-status', normalizeError(error).message, 'fail')
        }
      }

      async function loadManifest() {
        const brickly = requireBrickly()
        const report = createReport('manifest', getOptions())
        await record(report, 'brickly.getManifest', () => brickly.getManifest())
        report.summary = summarizeItems(report.items)
        renderResults('ui', report)
        setStatus('ui-status', 'Manifest 已读取', 'ok')
      }

      function clearResults() {
        renderSummary('ui-summary', null)
        renderSummary('runtime-summary', null)
        $('ui-results').innerHTML =
          '<div class="empty">点击“运行 UI 测试”，页面会调用 window.brickly.system.*。</div>'
        $('runtime-results').innerHTML =
          '<div class="empty">点击“运行 Runtime 测试”，页面会 invoke runtime 命令。</div>'
        setStatus('ui-status', '尚未运行', '')
        setStatus('runtime-status', '尚未运行', '')
      }

      async function guarded(run) {
        setBusy(true)
        try {
          await run()
        } catch (error) {
          const normalized = normalizeError(error)
          setStatus('ui-status', normalized.message, 'fail')
          setStatus('runtime-status', normalized.message, 'fail')
        } finally {
          setBusy(false)
          await refreshHealth()
        }
      }

      $('run-ui').addEventListener('click', () => guarded(runUiSuite))
      $('run-runtime').addEventListener('click', () => guarded(runRuntimeSuite))
      $('run-both').addEventListener('click', () =>
        guarded(async () => {
          await runUiSuite()
          await runRuntimeSuite()
        })
      )
      $('pick-directory').addEventListener('click', () => guarded(pickDirectory))
      $('load-manifest').addEventListener('click', () => guarded(loadManifest))
      $('clear-results').addEventListener('click', clearResults)

      refreshHealth()
    </script>
  </body>
</html>
