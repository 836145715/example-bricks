<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>窗口场景测试台</title>
    <link rel="stylesheet" href="./control.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Brickly · 窗口场景测试台</h1>
        <div class="meta" id="meta">waiting preload…</div>
      </div>
      <div class="top-actions">
        <button class="btn" id="btnRefresh" type="button">刷新列表</button>
        <button class="btn primary" id="btnSuiteNew" type="button">套件 · 新建多窗</button>
        <button class="btn" id="btnSuiteEnsure" type="button">套件 · ensure</button>
        <button class="btn danger" id="btnCloseChildren" type="button">关闭全部子窗</button>
      </div>
    </header>

    <main class="layout">
      <section class="panel">
        <h2>场景预设</h2>
        <div class="panel-body">
          <div class="mode-row">
            打开模式：
            <label><input type="radio" name="mode" value="ensure" checked /> ensure 复用</label>
            <label><input type="radio" name="mode" value="new" /> new 强制新建</label>
          </div>
          <div class="scenario-list" id="scenarioList">
            <div class="empty">场景列表加载中…</div>
          </div>
          <p class="hint">
            ensure：同一 scenario 只保留一扇窗，再点 focus。<br />
            new：每次新建，用于多窗并存与事件分流验证。
          </p>
        </div>
      </section>

      <section class="panel">
        <h2>窗口会话 (WinSession)</h2>
        <div class="panel-body">
          <table class="session-table">
            <thead>
              <tr>
                <th>窗口</th>
                <th>角色 / 场景</th>
                <th>事件</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="winSessionBody">
              <tr>
                <td colspan="4" class="empty">暂无窗口会话</td>
              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <h2>事件 / 日志</h2>
        <div class="panel-body">
          <div class="btn-row">
            <button class="btn ghost" id="btnClearLog" type="button">清空日志</button>
          </div>
          <ul class="log" id="log"></ul>
        </div>
      </section>
    </main>

    <script src="./control.js"></script>
  </body>
</html>
